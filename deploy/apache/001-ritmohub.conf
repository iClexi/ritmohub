<VirtualHost *:80>
    ServerName ritmohub.iclexi.tech

    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Host "ritmohub.iclexi.tech"

    Alias /_next/static /opt/ritmohub/app/.next/static
    <Directory /opt/ritmohub/app/.next/static>
        Require all granted
    </Directory>
    ProxyPass /_next/static !

    ProxyPass / http://127.0.0.1:5155/ timeout=60 retry=0
    ProxyPassReverse / http://127.0.0.1:5155/

    ErrorLog ${APACHE_LOG_DIR}/ritmohub-error.log
    CustomLog ${APACHE_LOG_DIR}/ritmohub-access.log combined
</VirtualHost>
