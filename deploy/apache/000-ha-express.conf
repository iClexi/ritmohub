<VirtualHost *:80>
    ServerName ha-web
    ServerAlias ha-web-master ha-web-backup 192.168.200.21 192.168.200.22 192.168.200.30 192.168.68.112

    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "https"

    ProxyPass /apache-health !
    Alias /apache-health /var/www/html/apache-health

    ProxyPass / http://127.0.0.1:5155/ timeout=60 retry=0
    ProxyPassReverse / http://127.0.0.1:5155/

    ErrorLog ${APACHE_LOG_DIR}/ha-express-error.log
    CustomLog ${APACHE_LOG_DIR}/ha-express-access.log combined
</VirtualHost>
