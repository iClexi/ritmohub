services:
  ritmohub:
    image: iclexi/ritmohub:latest
    container_name: ritmohub
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 5155
      DB_INIT_SCHEMA: "false"
    command: sh -c "node server.js 2>&1 | tee -a /ritmohub/logs/ritmohub.log"
    ports:
      - "5155:5155"
    volumes:
      - ritmohub_logs:/ritmohub/logs
      - ritmohub_next_cache:/ritmohub/.next/cache

volumes:
  ritmohub_logs:
  ritmohub_next_cache:
